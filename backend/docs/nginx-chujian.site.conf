# Nginx 配置示例：H5 指向 h5.chujian.site
# 1. 将此文件放入 /etc/nginx/sites-available/ 并创建软链接
# 2. certbot 自动申请 SSL: certbot --nginx -d h5.chujian.site
# 3. 后端 FastAPI 需在 127.0.0.1:8000 运行

server {
    listen 80;
    server_name h5.chujian.site;

    # 前端静态文件
    root /var/www/xlb-frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理到后端（同域名下解决跨域）
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # TTS 音频代理
    location /api/tts_audio/ {
        proxy_pass http://127.0.0.1:8000;
    }
}
