<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小萝卜性能统计</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        #stats-app { max-width: 480px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; background: #0f0f23; }
        .stats-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }
        .stats-header h2 { font-size: 18px; font-weight: 600; }
        .stats-content { flex: 1; overflow-y: auto; padding: 12px 16px; }
        .stats-content::-webkit-scrollbar { display: none; }
        .stats-summary { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .stat-card { flex: 1; min-width: 100px; background: rgba(255,255,255,0.04); border-radius: 10px; padding: 10px; text-align: center; }
        .stat-value { font-size: 18px; font-weight: 700; color: #2ecc71; }
        .stat-label { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 4px; }
        .filter-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .filter-row select { flex: 1; padding: 10px 12px; border: none; border-radius: 10px; background: #1a1a3e; color: #fff; font-size: 14px; outline: none; }
        .log-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .log-table th { text-align: left; padding: 8px 6px; color: rgba(255,255,255,0.5); font-weight: 500; border-bottom: 1px solid rgba(255,255,255,0.08); position: sticky; top: 0; background: #0f0f23; }
        .log-table td { padding: 8px 6px; border-bottom: 1px solid rgba(255,255,255,0.04); color: rgba(255,255,255,0.85); vertical-align: top; }
        .log-table tr.error td { color: #e74c3c; }
        .log-type { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; background: rgba(255,255,255,0.08); }
        .log-time { color: rgba(255,255,255,0.4); white-space: nowrap; }
        .timing-bar { display: flex; height: 6px; border-radius: 3px; overflow: hidden; margin-top: 4px; }
        .timing-seg { height: 100%; }
        .seg-upload { background: #3498db; }
        .seg-asr { background: #9b59b6; }
        .seg-llm { background: #f39c12; }
        .seg-tts { background: #2ecc71; }
        .seg-vision { background: #e74c3c; }
        .timing-legend { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; font-size: 11px; color: rgba(255,255,255,0.5); }
        .timing-legend span { display: flex; align-items: center; gap: 4px; }
        .dot-legend { width: 8px; height: 8px; border-radius: 2px; display: inline-block; }
    </style>
</head>
<body>
    <div id="stats-app">
        <div class="stats-header">
            <a href="./" class="btn-back">← 返回</a>
            <h2>对话耗时统计</h2>
            <span></span>
        </div>
        <div class="stats-content">
            <div class="stats-summary" id="stats-summary"></div>
            <div class="filter-row">
                <mdui-select id="filter-type" class="stats-filter-select">
                    <mdui-menu-item value="">全部类型</mdui-menu-item>
                    <mdui-menu-item value="voice_chat">语音对话</mdui-menu-item>
                    <mdui-menu-item value="text_chat">文字对话</mdui-menu-item>
                    <mdui-menu-item value="vision_chat">视觉对话</mdui-menu-item>
                </mdui-select>
            </div>
            <div class="timing-legend">
                <span><span class="dot-legend seg-upload"></span>上传</span>
                <span><span class="dot-legend seg-asr"></span>ASR</span>
                <span><span class="dot-legend seg-llm"></span>LLM</span>
                <span><span class="dot-legend seg-tts"></span>TTS</span>
                <span><span class="dot-legend seg-vision"></span>视觉</span>
            </div>
            <table class="log-table" style="margin-top:12px">
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>类型</th>
                        <th>耗时</th>
                        <th>内容</th>
                    </tr>
                </thead>
                <tbody id="log-tbody"></tbody>
            </table>
        </div>
    </div>
    <script type="module" src="./stats.js"></script>
</body>
</html>
